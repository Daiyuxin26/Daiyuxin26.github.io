<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人网站</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 36px;
      font-size: 24px;
    }

    p {
      font-size: 18px;
    }

    a {
      color: #0969da;
      text-decoration: none;
      margin-right: 16px;
    }

    a:hover {
      text-decoration: underline;
    }

    .tag {
      display: inline-block;
      background: #eef2ff;
      padding: 6px 12px;
      border-radius: 999px;
      margin: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>你好，我是你的名字</h1>
      <p>
        我正在建立自己的个人网站。这里会放我的介绍、项目、作品和联系方式。
      </p>

      <h2>关于我</h2>
      <p>
        我对技术、产品、设计和个人成长感兴趣。你可以在这里写你的职业背景、技能、兴趣或正在做的事情。
      </p>

      <h2>我会什么</h2>
      <div>
        <span class="tag">产品</span>
        <span class="tag">编程</span>
        <span class="tag">设计</span>
        <span class="tag">写作</span>
      </div>

      <h2>项目</h2>
      <p>
        项目 1：简单介绍你的项目。<br />
        项目 2：简单介绍你的作品、博客、App 或 GitHub 项目。
      </p>

      <h2>联系我</h2>
      <p>
        <a href="https://github.com/你的用户名" target="_blank">GitHub</a>
        <a href="mailto:你的邮箱@example.com">Email</a>
      </p>
    </section>
  </main>
</body>
</html>
